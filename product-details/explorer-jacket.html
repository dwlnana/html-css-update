<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="product details for our jacket">
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/bced115041.js" crossorigin="anonymous"></script>
    <title>Explorer-Jacket</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <input type="checkbox" id="menu_toggle">

            <div class="navbar_top">
                <div class="navbar_logo"> 
                     <img src="../images/RainyDays_Logo.png" alt="companylogo">
                </div>
                <label for="menu_toggle" class="menu_icon">☰</label>
            </div>
            <ul class="navbar_menu">
                <li> <a href="../index.html"> Home</a></li>
                <li><a href= "../product.html"> Products</a></li>
                <li><a href="../about-us.html"> About us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="product">
            <div><img src="../images/RainyDays_Jacket6.jpg" alt="Explorer-Jacket"></div>
            <div class="product-info">
                <h3>Men´s Anorak Explorer Jacket</h3>
                <p>A waterproof jacket designed to keep you dry in wet weather</p>
                <p class="price">$149,99</p> 
            </div>
            <div class="form-row">
                <label for="color">Color</label>
                <select name="color" id="color">
                    <option value="black">Black</option>
                    <option value="gray">Gray</option>
                    <option value="navy blue">Navy Blue</option>
                </select>
                <label for= "size">Size</label>
                <select name="size" id="size">
                    <option value="xs">XS</option>
                    <option value="s">S</option>
                    <option value="m">M</option>
                    <option value="l">L</option>
                    <option value="xl">XL</option>
                </select>
            </div> 
            <div class="action-button">
                <a href="../cart.html" class="cta-small cta-button">Add To Cart</a>
                <button class="wishlist_button" aria-label="add to wishlist">
                    <i class="fa-regular fa-heart"></i>
                </button>
            </div>
        </section>
    </main>
    <footer>
        <div>
            2025 Rainydays &copy;
        </div>
    </footer>
</body>
</html>
